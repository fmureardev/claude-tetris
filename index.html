<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <label class="theme-toggle" title="Cambiar tema claro/oscuro">
      <input type="checkbox" id="theme-toggle" />
      <span class="theme-toggle-track">
        <span class="theme-toggle-thumb"></span>
      </span>
    </label>
    <h1 class="game-title">TETRIS</h1>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>
        <div class="panel-section">
          <span class="label">COMBO</span>
          <span class="value" id="combo">0</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <p id="overlay-stats"></p>
        <div id="name-entry" class="hidden">
          <input type="text" id="name-input" maxlength="12" placeholder="Tu nombre" autocomplete="off" />
          <button id="save-name-btn">Guardar</button>
        </div>
        <div class="scores-panel">
          <span class="label">RÉCORDS</span>
          <div id="overlay-scores-list"></div>
        </div>
        <button id="restart-btn">Reiniciar</button>
        <button class="reset-scores-btn">Borrar récords</button>
      </div>
    </div>

    <div id="start-screen" class="overlay">
      <div class="overlay-box">
        <p id="start-title">TETRIS</p>
        <div class="scores-panel">
          <span class="label">RÉCORDS</span>
          <div id="start-scores-list"></div>
        </div>
        <div class="stats-panel">
          <span class="label">MEJOR COMBO</span>
          <span class="value" id="start-best-combo">0</span>
          <span class="label">MÁS LÍNEAS</span>
          <span class="value" id="start-max-lines">0</span>
        </div>
        <button id="start-btn">Iniciar</button>
        <button class="reset-scores-btn">Borrar récords</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
