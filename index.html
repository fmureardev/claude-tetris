<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <label class="theme-toggle" title="Cambiar tema claro/oscuro">
      <input type="checkbox" id="theme-toggle" />
      <span class="theme-toggle-track">
        <span class="theme-toggle-thumb"></span>
      </span>
    </label>
    <h1 class="game-title">TETRIS</h1>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="start-overlay" class="overlay">
      <div class="overlay-box records-box">
        <p class="start-title">TETRIS</p>
        <div class="records-panel">
          <h2>Récords</h2>
          <table class="records-table">
            <thead><tr><th>#</th><th>Nombre</th><th>Puntos</th><th>Líneas</th><th>Combo</th></tr></thead>
            <tbody id="start-records-body"></tbody>
          </table>
          <div class="records-stats">
            <span>Mejor combo: <strong id="start-best-combo">0</strong></span>
            <span>Máx. líneas: <strong id="start-max-lines">0</strong></span>
          </div>
          <button id="reset-records-btn" class="secondary-btn" type="button">Resetear récords</button>
        </div>
        <button id="start-btn" type="button">Jugar</button>
      </div>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <p id="overlay-stats"></p>
        <div id="name-entry" class="hidden">
          <input id="player-name-input" type="text" maxlength="12" placeholder="Tu nombre" autocomplete="off" />
          <button id="save-score-btn" type="button">Guardar</button>
        </div>
        <div class="records-panel" id="overlay-records-panel">
          <h2>Récords</h2>
          <table class="records-table">
            <thead><tr><th>#</th><th>Nombre</th><th>Puntos</th><th>Líneas</th><th>Combo</th></tr></thead>
            <tbody id="overlay-records-body"></tbody>
          </table>
          <div class="records-stats">
            <span>Mejor combo: <strong id="overlay-best-combo">0</strong></span>
            <span>Máx. líneas: <strong id="overlay-max-lines">0</strong></span>
          </div>
          <button id="reset-records-btn-2" class="secondary-btn" type="button">Resetear récords</button>
        </div>
        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
